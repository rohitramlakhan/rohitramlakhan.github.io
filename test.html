<html>
<head>
  <meta charset="utf-8" />

  <script type="text/javascript"
    src="https://www.gstatic.com/charts/loader.js">
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: white;
    }

    #sankey_basic {
      width: 100%;
      height: 100%;
    }
  </style>

  <script type="text/javascript">

    google.charts.load('current', {
      packages:['sankey']
    });

    google.charts.setOnLoadCallback(loadArcGISData);

    // -----------------------------------
    // FEATURE SERVICE
    // -----------------------------------
    const url =
      "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2/query" +
      "?where=1%3D1" +
      "&outFields=Herkomst_land,Bestemming_Land,Lading" +
      "&returnGeometry=false" +
      "&f=json";

    // -----------------------------------
    // COUNTRY GROUPING
    // -----------------------------------
    function normalizeCountry(v) {

      let c = (v || "")
        .toString()
        .trim()
        .toUpperCase();

      if (!c) return "OTHER";

      const allowed = ["NL", "BE", "DE", "FR"];

      return allowed.includes(c) ? c : "OTHER";
    }

    // -----------------------------------
    // LOAD DATA
    // -----------------------------------
    async function loadArcGISData() {

      try {

        const response = await fetch(url);
        const json = await response.json();

        const outbound = new Map();
        const inbound = new Map();

        json.features.forEach(f => {

          const a = f.attributes;

          let from = normalizeCountry(a.Herkomst_land);
          let to   = normalizeCountry(a.Bestemming_Land);
          let val  = Number(a.Lading) || 1;

          // NL → others
          if (from === "NL" && to !== "NL") {
            outbound.set(to, (outbound.get(to) || 0) + val);
          }

          // others → NL
          if (to === "NL" && from !== "NL") {
            inbound.set(from, (inbound.get(from) || 0) + val);
          }

        });

        const rows = [];

        outbound.forEach((outVal, country) => {

          const inVal = inbound.get(country) || 0;

          const label =
            `NL → ${country}: ${outVal.toLocaleString()} ton | ${country}\n→ NL: ${inVal.toLocaleString()} ton`;

          rows.push([
            "Lading",
            label,
            outVal
          ]);

        });

        drawChart(rows);

      }
      catch (err) {
        console.error(err);
      }
    }

    // -----------------------------------
    // DRAW SANKEY
    // -----------------------------------
    function drawChart(rows) {

      const data = new google.visualization.DataTable();

      data.addColumn('string', 'From');
      data.addColumn('string', 'To');
      data.addColumn('number', 'Weight');

      data.addRows(rows);

      const colors = [
        '#3366CC',
        '#DC3912',
        '#FF9900',
        '#109618',
        '#990099',
        '#0099C6',
        '#DD4477',
        '#66AA00'
      ];

      const options = {

        width: window.innerWidth,
        height: window.innerHeight,

        sankey: {

          node: {
            width: 20,
            nodePadding: 40,
            label: {
              fontSize: 14,
              color: '#000'
            }
          },

          link: {
            colorMode: 'target',
            colors: colors
          }
        }
      };

      const chart = new google.visualization.Sankey(
        document.getElementById('sankey_basic')
      );

      chart.draw(data, options);
    }

    // -----------------------------------
    // RESIZE
    // -----------------------------------
    window.addEventListener("resize", () => {
      loadArcGISData();
    });

  </script>
</head>

<body>
  <div id="sankey_basic"></div>
</body>
</html>
