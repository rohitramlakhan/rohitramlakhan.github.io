<html>
<head>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body, #viewDiv {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }
  </style>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/GraphicsLayer",
      "esri/Graphic"
    ], function(Map, MapView, GraphicsLayer, Graphic) {

      const layerUrl =
        "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2";

      const graphicsLayer = new GraphicsLayer();

      const map = new Map({
        basemap: "gray-vector",
        layers: [graphicsLayer]
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [5.29, 52.13],
        zoom: 5
      });

      function getPoint(seed) {
        // deterministic fake positions per country
        let hash = 0;
        for (let i = 0; i < seed.length; i++) {
          hash = seed.charCodeAt(i) + ((hash << 5) - hash);
        }

        const x = 5 + (hash % 100) / 10;
        const y = 50 + (hash % 60) / 10;

        return [x, y];
      }

      fetch(layerUrl + "/query?where=1%3D1&outFields=Herkomst_land,Bestemming_Land,Lading&returnGeometry=false&f=json")
        .then(res => res.json())
        .then(data => {

          const flows = {};

          data.features.forEach(f => {

            const a = f.attributes;

            const from = (a.Herkomst_land || "").trim();
            const to = (a.Bestemming_Land || "").trim();
            const value = Number(a.Lading) || 1;

            if (!from || !to) return;

            const key = from + "->" + to;

            flows[key] = (flows[key] || 0) + value;
          });

          Object.entries(flows).forEach(([key, value]) => {

            const [from, to] = key.split("->");

            const line = {
              type: "polyline",
              paths: [
                [
                  getPoint(from),
                  getPoint(to)
                ]
              ]
            };

            const graphic = new Graphic({
              geometry: line,
              symbol: {
                type: "simple-line",
                color: [0, 100, 255, 0.6],
                width: Math.max(1, value / 10)
              }
            });

            graphicsLayer.add(graphic);
          });

        });

    });
  </script>
</head>

<body>
  <div id="viewDiv"></div>
</body>
</html>
