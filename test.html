<html>
  <head>
    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <script>
      google.charts.load('current', { packages: ['sankey'] });

      google.charts.setOnLoadCallback(init);

      async function init() {
        // Experience Builder injects the map view in most widget setups
        // If not, you may need to replace this with this.view / props.view depending on widget type

        const view = window._view || window.view || null;

        if (!view || !view.map) {
          document.getElementById("sankey").innerHTML =
            "Map view not available in this context.";
          return;
        }

        // 🔥 Get feature layer from web map (no URL)
        const layer =
          view.map.allLayers.find(l => l.type === "feature");

        if (!layer) {
          document.getElementById("sankey").innerHTML =
            "No feature layer found in web map.";
          return;
        }

        await view.whenLayerView(layer);

        const fs = await layer.queryFeatures({
          where: "1=1",
          outFields: ["Herkomst_land", "Bestemming_Land"],
          returnGeometry: false
        });

        const map = new Map();

        fs.features.forEach(f => {

          const a = f.attributes;

          const from = (a.Herkomst_land || "").toString().trim();
          const to = (a.Bestemming_Land || "").toString().trim();

          if (!from || !to) return;

          const key = from + "->" + to;

          map.set(key, (map.get(key) || 0) + 1);
        });

        const rows = Array.from(map.entries()).map(([k, v]) => {
          const [from, to] = k.split("->");
          return [from, to, v];
        });

        console.log("Sankey rows:", rows.length);

        if (rows.length === 0) {
          document.getElementById("sankey").innerHTML =
            "No valid data found.";
          return;
        }

        const data = new google.visualization.DataTable();
        data.addColumn('string', 'From');
        data.addColumn('string', 'To');
        data.addColumn('number', 'Weight');
        data.addRows(rows);

        const chart = new google.visualization.Sankey(
          document.getElementById('sankey')
        );

        chart.draw(data, {
          width: 1200,
          height: 800,
          sankey: {
            node: {
              label: {
                fontSize: 12
              }
            }
          }
        });
      }
    </script>
  </head>

  <body style="margin:0;">
    <div id="sankey" style="width:100%; height:800px;"></div>
  </body>
</html>
