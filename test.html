<html>
  <head>
    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <script>
      google.charts.load('current', { packages: ['sankey'] });

      google.charts.setOnLoadCallback(loadAndDraw);

      async function loadAndDraw() {

        const url =
          "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2/query" +
          "?where=1%3D1" +
          "&outFields=Herkomst_land,Bestemming_Land" +
          "&returnGeometry=false" +
          "&f=json";

        const response = await fetch(url);
        const json = await response.json();

        console.log("Features loaded:", json.features.length);

        const rows = [];

        json.features.forEach(f => {

          const a = f.attributes;

          const from = (a.Herkomst_land || "").trim();
          const to = (a.Bestemming_Land || "").trim();

          // safety checks
          if (!from || !to) return;

          rows.push([from, to, 1]);
        });

        console.log("Rows for Sankey:", rows.length);

        // IMPORTANT: prevent empty chart crash
        if (rows.length === 0) {
          document.getElementById("sankey").innerHTML =
            "No valid data found";
          return;
        }

        const data = new google.visualization.DataTable();
        data.addColumn('string', 'From');
        data.addColumn('string', 'To');
        data.addColumn('number', 'Weight');
        data.addRows(rows);

        const chart = new google.visualization.Sankey(
          document.getElementById('sankey')
        );

        chart.draw(data, {
          width: 1200,
          height: 800
        });
      }
    </script>
  </head>

  <body style="margin:0;">
    <div id="sankey" style="width:100%; height:800px;"></div>
  </body>
</html>
