<html>
<head>
  <meta charset="utf-8" />

  <script type="text/javascript"
    src="https://www.gstatic.com/charts/loader.js">
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: white;
    }

    #sankey_basic {
      width: 100%;
      height: 100%;
      min-height: 600px;
    }
  </style>

  <script type="text/javascript">

    google.charts.load('current', {
      packages:['sankey']
    });

    google.charts.setOnLoadCallback(waitForContainer);

    // -----------------------------------
    // WAIT UNTIL CONTAINER HAS SIZE
    // -----------------------------------
    function waitForContainer() {

      const container =
        document.getElementById('sankey_basic');

      const check = setInterval(() => {

        const w = container.clientWidth;
        const h = container.clientHeight;

        console.log("Checking size:", w, h);

        if (w > 0 && h > 0) {

          clearInterval(check);

          loadArcGISData();

        }

      }, 300);

    }

    // -----------------------------------
    // FEATURE SERVICE
    // -----------------------------------
    const url =
      "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2/query" +
      "?where=1%3D1" +
      "&outFields=Herkomst_land,Bestemming_Land,Lading" +
      "&returnGeometry=false" +
      "&f=json";

    // -----------------------------------
    // COUNTRY GROUPING
    // -----------------------------------
    function normalizeCountry(v) {

      let c = (v || "")
        .toString()
        .trim()
        .toUpperCase();

      if (!c) return "OTHER";

      const allowed = ["NL", "BE", "DE", "FR"];

      return allowed.includes(c) ? c : "OTHER";
    }

    // -----------------------------------
    // LOAD DATA
    // -----------------------------------
    async function loadArcGISData() {

      try {

        console.log("Loading ArcGIS data...");

        const response = await fetch(url);

        const json = await response.json();

        console.log("Features:", json.features.length);

        const outbound = new Map();
        const inbound = new Map();

        json.features.forEach(f => {

          const a = f.attributes;

          let from = normalizeCountry(a.Herkomst_land);
          let to   = normalizeCountry(a.Bestemming_Land);
          let val  = Number(a.Lading) || 1;

          // NL → others
          if (from === "NL" && to !== "NL") {

            outbound.set(
              to,
              (outbound.get(to) || 0) + val
            );

          }

          // others → NL
          if (to === "NL" && from !== "NL") {

            inbound.set(
              from,
              (inbound.get(from) || 0) + val
            );

          }

        });

        const rows = [];

        outbound.forEach((outVal, country) => {

          const inVal =
            inbound.get(country) || 0;

          const label =
            `NL → ${country}: ${outVal.toLocaleString()} ton | ${country}\n→ NL: ${inVal.toLocaleString()} ton`;

          rows.push([
            "NL",
            label,
            outVal
          ]);

        });

        console.log("Rows:", rows);

        drawChart(rows);

      }
      catch (err) {

        console.error("Data load error:", err);

      }
    }

    // -----------------------------------
    // DRAW CHART
    // -----------------------------------
    function drawChart(rows) {

      try {

        const container =
          document.getElementById('sankey_basic');

        const width =
          container.clientWidth;

        const height =
          container.clientHeight;

        console.log("Drawing chart:", width, height);

        const data =
          new google.visualization.DataTable();

        data.addColumn('string', 'From');
        data.addColumn('string', 'To');
        data.addColumn('number', 'Weight');

        data.addRows(rows);

        const colors = [
          '#3366CC',
          '#DC3912',
          '#FF9900',
          '#109618',
          '#990099',
          '#0099C6',
          '#DD4477',
          '#66AA00'
        ];

        const options = {

          width: width,
          height: height,

          sankey: {

            node: {

              width: 20,

              nodePadding: 40,

              label: {

                fontSize: 14,
                color: '#000'

              }
            },

            link: {

              colorMode: 'target',

              colors: colors

            }
          }
        };

        const chart =
          new google.visualization.Sankey(
            container
          );

        chart.draw(data, options);

        console.log("Chart drawn");

      }
      catch(err) {

        console.error(
          "Chart draw error:",
          err
        );

      }
    }

  </script>
</head>

<body>

  <div id="sankey_basic"></div>

</body>
</html>
