<html>
<head>
  <meta charset="utf-8" />
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; }
    svg { width: 100vw; height: 100vh; }
  </style>
</head>

<body>
<svg></svg>

<script>

const url =
  "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2/query" +
  "?where=1%3D1" +
  "&outFields=Herkomst_land,Bestemming_Land,Lading" +
  "&returnGeometry=false&f=json";

// -----------------------------
// CORE NORMALISATION LOGIC
// -----------------------------
function normalizeCountry(v) {
  let c = (v || "").toString().trim().toUpperCase();

  if (!c) return "UNKNOWN";

  // keep NL as-is
  if (c === "NL") return "NL";

  // everything else stays its own country code
  // (BE, DE, FR, etc.)
  return c;
}

fetch(url)
  .then(r => r.json())
  .then(data => {

    const nodesSet = new Set();
    const linksMap = new Map();

    data.features.forEach(f => {

      const a = f.attributes;

      let from = normalizeCountry(a.Herkomst_land);
      let to = normalizeCountry(a.Bestemming_Land);
      let value = Number(a.Lading) || 1;

      if (!from || !to) return;

      nodesSet.add(from);
      nodesSet.add(to);

      const key = from + "->" + to;

      linksMap.set(key, (linksMap.get(key) || 0) + value);
    });

    const nodes = Array.from(nodesSet);
    const index = new Map(nodes.map((d, i) => [d, i]));

    const matrix = Array(nodes.length)
      .fill(0)
      .map(() => Array(nodes.length).fill(0));

    linksMap.forEach((value, key) => {
      const [from, to] = key.split("->");
      matrix[index.get(from)][index.get(to)] = value;
    });

    // -----------------------------
    // CHORD DIAGRAM (CLEAN VIEW)
    // -----------------------------
    const width = window.innerWidth;
    const height = window.innerHeight;
    const outerRadius = Math.min(width, height) * 0.45;
    const innerRadius = outerRadius - 20;

    const svg = d3.select("svg")
      .attr("viewBox", [-width/2, -height/2, width, height]);

    const chord = d3.chordDirected()
      .padAngle(0.03)
      .sortSubgroups(d3.descending);

    const arc = d3.arc()
      .innerRadius(innerRadius)
      .outerRadius(innerRadius + 12);

    const ribbon = d3.ribbonArrow()
      .radius(innerRadius);

    const color = d3.scaleOrdinal()
      .domain(nodes)
      .range(d3.schemeTableau10);

    const chords = chord(matrix);

    // GROUPS
    const group = svg.append("g")
      .selectAll("g")
      .data(chords.groups)
      .join("g");

    group.append("path")
      .attr("fill", d => color(nodes[d.index]))
      .attr("d", arc);

    group.append("text")
      .each(d => d.angle = (d.startAngle + d.endAngle) / 2)
      .attr("dy", "0.35em")
      .attr("transform", d =>
        `rotate(${d.angle * 180 / Math.PI - 90})
         translate(${innerRadius + 18})
         ${d.angle > Math.PI ? "rotate(180)" : ""}`
      )
      .attr("text-anchor", d => d.angle > Math.PI ? "end" : "start")
      .text(d => nodes[d.index]);

    // FLOWS
    svg.append("g")
      .attr("fill-opacity", 0.75)
      .selectAll("path")
      .data(chords)
      .join("path")
      .attr("d", ribbon)
      .attr("fill", d => color(nodes[d.source.index]))
      .append("title")
      .text(d =>
        `${nodes[d.source.index]} → ${nodes[d.target.index]}`
      );

  });

</script>
</body>
</html>
