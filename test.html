<script>
  // force clean loader state
  window.google = undefined;
</script>

<script src="https://www.gstatic.com/charts/loader.js?cachebust="></script>

<script>
  google.charts.load('current', {
    packages: ['sankey'],
    callback: drawChart
  });

  function drawChart() {
    const data = new google.visualization.DataTable();
    data.addColumn('string', 'From');
    data.addColumn('string', 'To');
    data.addColumn('number', 'Weight');

    data.addRows([
      ['A','X',5],
      ['B','Y',3],
      ['C','Z',2]
    ]);

    new google.visualization.Sankey(
      document.getElementById('sankey')
    ).draw(data);
  }
</script>
