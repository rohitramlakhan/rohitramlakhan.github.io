<html>
<head>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body, #viewDiv {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }
  </style>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/Graphic",
      "esri/layers/GraphicsLayer"
    ], function(Map, MapView, Graphic, GraphicsLayer) {

      const url =
        "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2";

      const graphicsLayer = new GraphicsLayer();

      const map = new Map({
        basemap: "gray-vector",
        layers: [graphicsLayer]
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [5, 52],
        zoom: 4
      });

      // Simple deterministic “country position generator”
      function getCoord(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
          hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }

        const lon = (hash % 360) - 180;
        const lat = (hash % 160) - 80;

        return [lon, lat];
      }

      function clean(v) {
        return (v || "").toString().trim();
      }

      fetch(url + "/query?where=1%3D1&outFields=Herkomst_land,Bestemming_Land,Lading&returnGeometry=false&f=json")
        .then(res => res.json())
        .then(data => {

          const flows = new Map();

          // aggregate flows
          data.features.forEach(f => {

            const a = f.attributes;

            const from = clean(a.Herkomst_land);
            const to = clean(a.Bestemming_Land);
            const value = Number(a.Lading) || 1;

            if (!from || !to) return;

            const key = from + "->" + to;
            flows.set(key, (flows.get(key) || 0) + value);
          });

          // draw lines
          flows.forEach((value, key) => {

            const [from, to] = key.split("->");

            const polyline = {
              type: "polyline",
              paths: [[
                getCoord(from),
                getCoord(to)
              ]]
            };

            const graphic = new Graphic({
              geometry: polyline,
              symbol: {
                type: "simple-line",
                color: [0, 120, 255, 0.6],
                width: Math.max(1, value / 20)
              }
            });

            graphicsLayer.add(graphic);
          });

        });

    });
  </script>
</head>

<body>
  <div id="viewDiv"></div>
</body>
</html>
