<html>
  <head>
    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <script>
      google.charts.load('current', { packages: ['sankey'] });
      google.charts.setOnLoadCallback(drawChart);

      async function drawChart() {

        const response = await fetch(
          "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2/query?where=1%3D1&outFields=UNLO_Herkomst,UNLO_Bestemming,Lading&returnGeometry=false&f=json"
        );

        const json = await response.json();

        // IMPORTANT: aggregate to avoid duplicates
        const map = {};

        json.features.forEach(f => {

          const a = f.attributes;

          if (!a.UNLO_Herkomst || !a.UNLO_Bestemming) return;

          const key = a.UNLO_Herkomst + "->" + a.UNLO_Bestemming;

          const value = Number(a.Lading) || 0;

          if (!map[key]) {
            map[key] = {
              from: a.UNLO_Herkomst,
              to: a.UNLO_Bestemming,
              weight: 0
            };
          }

          map[key].weight += value;
        });

        const rows = Object.values(map).map(d => [
          d.from,
          d.to,
          d.weight
        ]);

        const data = new google.visualization.DataTable();

        data.addColumn('string', 'From');
        data.addColumn('string', 'To');
        data.addColumn('number', 'Weight');

        data.addRows(rows);

        const chart = new google.visualization.Sankey(
          document.getElementById('sankey_basic')
        );

        chart.draw(data, {
          width: 1200,
          height: 800
        });
      }
    </script>
  </head>

  <body>
    <div id="sankey_basic" style="width:1200px;height:800px;"></div>
  </body>
</html>
