<html>
<head>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body, #viewDiv {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }
  </style>

  <script>
    require([
      "esri/views/MapView",
      "esri/WebMap",
      "esri/layers/FeatureLayer"
    ], function(MapView, WebMap, FeatureLayer) {

      const layerUrl =
        "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2";

      const layer = new FeatureLayer({
        url: layerUrl
      });

      const webmap = new WebMap({
        basemap: "gray-vector",
        layers: [layer]
      });

      const view = new MapView({
        container: "viewDiv",
        map: webmap,
        center: [5.29, 52.13],
        zoom: 6
      });

      layer.queryFeatures({
        where: "1=1",
        outFields: ["UNLO_Herkomst", "UNLO_Bestemming", "Goederentype", "Lading"],
        returnGeometry: false
      }).then(result => {

        const nodes = new Map();
        const links = [];

        result.features.forEach(f => {

          const a = f.attributes;

          const from = a.UNLO_Herkomst;
          const to = a.UNLO_Bestemming;
          const type = a.Goederentype;
          const value = Number(a.Lading);

          if (!from || !to || isNaN(value)) return;

          // create nodes (ArcGIS-native graph structure)
          nodes.set(from, { id: from });
          nodes.set(to, { id: to });

          links.push({
            source: from,
            target: to,
            weight: value,
            type: type
          });
        });

        console.log("Nodes:", nodes);
        console.log("Links:", links);

        // For now we visualize structure in console-ready form
        // Next step = real graph renderer (see below)

        drawSimpleGraph(view, nodes, links);

      });

      function drawSimpleGraph(view, nodes, links) {

        // Minimal visual debug layer using graphics

        const graphics = [];

        links.forEach(l => {

          graphics.push({
            type: "polyline",
            paths: [[
              randomPoint(l.source),
              randomPoint(l.target)
            ]],
            symbol: {
              type: "simple-line",
              color: "blue",
              width: Math.max(1, l.weight / 10)
            }
          });

        });

        view.graphics.addMany(graphics);

        function randomPoint(seed) {
          // deterministic fake positions (replace with real geometry later)
          const hash = seed.split("").reduce((a,b)=>a+b.charCodeAt(0),0);
          return [
            5 + (hash % 100) / 10,
            52 + (hash % 50) / 10
          ];
        }
      }

    });
  </script>
</head>

<body>
  <div id="viewDiv"></div>
</body>
</html>
