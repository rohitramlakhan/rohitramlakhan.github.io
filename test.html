<html>
<head>
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <script>
    google.charts.load('current', { packages: ['sankey'] });
    google.charts.setOnLoadCallback(loadData);

    function clean(v) {
      return (v || "")
        .toString()
        .normalize("NFKC")
        .replace(/\s+/g, " ")
        .trim();
    }

    async function loadData() {

      const url =
        "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2/query" +
        "?where=1%3D1" +
        "&outFields=Herkomst_land,Bestemming_Land" +
        "&returnGeometry=false" +
        "&f=json";

      const response = await fetch(url);
      const json = await response.json();

      const map = new Map();

      json.features.forEach(f => {

        const a = f.attributes;

        let from = clean(a.Bestemming_Land);
        let to = clean(a.Herkomst_land);

        // 🚨 HARD SAFETY FILTERS
        if (!from || !to) return;
        if (from === to) return; // self-loop kill

        // deterministic ordering (cycle prevention)
        const [a1, a2] = from < to ? [from, to] : [to, from];

        const key = a1 + "->" + a2;

        map.set(key, (map.get(key) || 0) + 1);
      });

      const rows = Array.from(map.entries()).map(([k, v]) => {
        const [from, to] = k.split("->");
        return [from, to, v];
      });

      console.log("ROWS:", rows.length, rows);

      if (rows.length === 0) {
        document.getElementById("sankey").innerHTML = "No valid data";
        return;
      }

      const data = new google.visualization.DataTable();
      data.addColumn('string', 'From');
      data.addColumn('string', 'To');
      data.addColumn('number', 'Weight');
      data.addRows(rows);

      const chart = new google.visualization.Sankey(
        document.getElementById('sankey')
      );

      chart.draw(data, {
        width: 1200,
        height: 800
      });
    }
  </script>
</head>

<body style="margin:0;">
  <div id="sankey" style="width:100%; height:800px;"></div>
</body>
</html>
