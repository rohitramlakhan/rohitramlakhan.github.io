<html>
  <head>
    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <script>
      google.charts.load('current', { packages: ['sankey'] });
      google.charts.setOnLoadCallback(loadData);

      async function loadData() {

        const url =
          "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2/query" +
          "?where=1%3D1" +
          "&outFields=Herkomst_land,Bestemming_Land" +
          "&returnGeometry=false" +
          "&f=json";

        const response = await fetch(url);
        const json = await response.json();

        const map = new Map();

        json.features.forEach(f => {

          const a = f.attributes;

          let from = (a.Herkomst_land || "").trim();
          let to = (a.Bestemming_Land || "").trim();

          if (!from || !to) return;

          // 🔴 FIX 1: enforce stable direction (prevents A↔B cycles)
          const key =
            from < to
              ? from + "->" + to
              : to + "->" + from;

          // 🔴 FIX 2: ensure no duplicates
          map.set(key, {
            from: key.split("->")[0],
            to: key.split("->")[1],
            value: (map.get(key)?.value || 0) + 1
          });

        });

        const rows = Array.from(map.values()).map(d => [
          d.from,
          d.to,
          d.value
        ]);

        console.log("ROWS:", rows.length);

        const data = new google.visualization.DataTable();
        data.addColumn('string', 'From');
        data.addColumn('string', 'To');
        data.addColumn('number', 'Weight');
        data.addRows(rows);

        const chart = new google.visualization.Sankey(
          document.getElementById('sankey')
        );

        chart.draw(data, {
          width: 1200,
          height: 800
        });
      }
    </script>
  </head>

  <body style="margin:0;">
    <div id="sankey" style="width:100%; height:800px;"></div>
  </body>
</html>
