<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <script>

    google.charts.load('current', {
      packages: ['sankey']
    });

    google.charts.setOnLoadCallback(loadData);

    async function loadData() {

      const url =
        "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2/query" +
        "?where=1%3D1" +
        "&outFields=UNLO_Herkomst,UNLO_Bestemming,Goederentype,Lading" +
        "&returnGeometry=false" +
        "&f=json";

      const response = await fetch(url);

      const json = await response.json();

      const rows = [];

      json.features.forEach(feature => {

        const a = feature.attributes;

        const herkomst = a.UNLO_Herkomst || "Unknown";
        const bestemming = a.UNLO_Bestemming || "Unknown";
        const goederen = a.Goederentype || "Unknown";
        const lading = Number(a.Lading) || 0;

        // Step 1:
        // Herkomst -> Goederentype
        rows.push([
          herkomst,
          goederen,
          lading
        ]);

        // Step 2:
        // Goederentype -> Bestemming
        rows.push([
          goederen,
          bestemming,
          lading
        ]);

      });

      drawChart(rows);
    }

    function drawChart(rows) {

      const data =
        new google.visualization.DataTable();

      data.addColumn('string', 'From');
      data.addColumn('string', 'To');
      data.addColumn('number', 'Weight');

      data.addRows(rows);

      const options = {

        height: 800,

        sankey: {
          node: {
            label: {
              fontSize: 14
            }
          }
        }

      };

      const chart =
        new google.visualization.Sankey(
          document.getElementById('sankey')
        );

      chart.draw(data, options);
    }

    // Redraw on resize
    window.addEventListener('resize', loadData);

  </script>

</head>

<body style="margin:0; padding:0;">

  <div id="sankey"
       style="width:100%; height:100vh;">
  </div>

</body>

</html>
