<html>
  <head>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <script type="text/javascript">
      google.charts.load('current', {'packages':['sankey']});
      google.charts.setOnLoadCallback(drawChart);

      async function drawChart() {

        const response = await fetch(
          "https://services-eu1.arcgis.com/4D1GBrbE6xp1T4YG/arcgis/rest/services/Visie_vaarwegen/FeatureServer/2/query?where=1%3D1&outFields=UNLO_Herkomst,UNLO_Bestemming,Goederentype,Lading&returnGeometry=false&f=json"
        );

        const json = await response.json();

        var rows = [];

        json.features.forEach(function(feature) {

          var a = feature.attributes;

          rows.push([
            a.UNLO_Herkomst,
            a.Goederentype,
            Number(a.Lading)
          ]);

          rows.push([
            a.Goederentype,
            a.UNLO_Bestemming,
            Number(a.Lading)
          ]);

        });

        var data = new google.visualization.DataTable();

        data.addColumn('string', 'From');
        data.addColumn('string', 'To');
        data.addColumn('number', 'Weight');

        data.addRows(rows);

        // Sets chart options.
        var options = {
          width: 900,
          height: 600
        };

        // Instantiates and draws our chart, passing in some options.
        var chart = new google.visualization.Sankey(
          document.getElementById('sankey_basic')
        );

        chart.draw(data, options);
      }
    </script>
  </head>

  <body>
    <div id="sankey_basic" style="width: 900px; height: 600px;"></div>
  </body>
</html>
